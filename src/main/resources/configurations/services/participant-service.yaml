spring:
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:12500/postgres
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

servlet:
  multipart:
    enabled: true
    max-file-size: 5MB
    max-request-size: 10MB

server:
  port: 8000
  forward-headers-strategy: framework

app:
  storage:
    path: ${user.home}/.ijse/eca/students